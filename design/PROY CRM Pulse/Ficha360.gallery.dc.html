<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
  <meta name="design_doc_mode" content="canvas">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/tokens/colors.css">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/tokens/typography.css">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/tokens/layout.css">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/tokens/base.css">
  <link rel="stylesheet" href="_ds/pulse-crm-ds-pbv-9fef4bfe-5d0e-47b0-b9e7-0d987e918eaa/styles.css">
  <style>
    body{margin:0;background:var(--surface-page);font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--text-primary)}
    .grp{padding:36px 44px;border-bottom:1px solid var(--border-default)}
    .grp-hd{display:flex;align-items:baseline;gap:10px;margin:0 0 20px}
    .grp-w{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;font-weight:700;background:#1a1a1a;color:#fff;border-radius:5px;padding:3px 8px}
    .grp-t{font-size:14px;font-weight:700;letter-spacing:-0.01em}
    .grp-s{font-size:12px;color:var(--text-muted)}
    .row{display:flex;gap:28px;align-items:flex-start}
    .cell{display:flex;flex-direction:column;gap:9px;flex:none}
    .cell-l{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)}
    .frame{background:var(--surface-card);border:1px solid var(--border-default);border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(15,23,42,.08)}
  </style>
</helmet>
<div>

  <div class="grp">
    <div class="grp-hd"><span class="grp-w">375px</span><span class="grp-t">Móvil</span><span class="grp-s">app bar (atrás + editar) + barra inferior · 1 columna</span></div>
    <div class="row">
      <div class="cell"><div class="cell-l">Ficha llena</div><div class="frame" style="width:375px;height:860px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="mobile" scenario="llena" hint-size="375px,860px"></dc-import></div></div>
      <div class="cell"><div class="cell-l">Sin actividad</div><div class="frame" style="width:375px;height:860px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="mobile" scenario="vacia" hint-size="375px,860px"></dc-import></div></div>
    </div>
  </div>

  <div class="grp">
    <div class="grp-hd"><span class="grp-w">768px</span><span class="grp-t">Tablet</span><span class="grp-s">sidebar + topbar · 2 columnas</span></div>
    <div class="row">
      <div class="cell"><div class="cell-l">Ficha llena</div><div class="frame" style="width:768px;height:680px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="desktop" scenario="llena" hint-size="768px,680px"></dc-import></div></div>
      <div class="cell"><div class="cell-l">Sin actividad</div><div class="frame" style="width:768px;height:680px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="desktop" scenario="vacia" hint-size="768px,680px"></dc-import></div></div>
    </div>
  </div>

  <div class="grp" style="border-bottom:none">
    <div class="grp-hd"><span class="grp-w">1280px</span><span class="grp-t">Escritorio</span><span class="grp-s">sidebar + topbar · 2 columnas · contenido máx. 1100px</span></div>
    <div class="row">
      <div class="cell"><div class="cell-l">Ficha llena</div><div class="frame" style="width:1280px;height:700px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="desktop" scenario="llena" hint-size="1280px,700px"></dc-import></div></div>
      <div class="cell"><div class="cell-l">Sin actividad</div><div class="frame" style="width:1280px;height:700px"><dc-import name="Ficha360.screen" style="width:100%;height:100%;display:block" mode="desktop" scenario="vacia" hint-size="1280px,700px"></dc-import></div></div>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
