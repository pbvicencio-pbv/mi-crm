# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# .coderabbit.yaml — Monorepo (pnpm workspace, Turborepo, Nx, Lerna)
# Usa path_instructions para aplicar reglas específicas por paquete.

language: es-ES

tone_instructions: |
  Sé directo y conciso. Considera siempre el blast radius cross-package
  cuando un cambio podría afectar otros paquetes del monorepo.

reviews:
  profile: chill
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main, master, develop]

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/.turbo/**"
    - "!**/.nx/**"
    - "!**/coverage/**"
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/*.d.ts"
    - "!**/__snapshots__/**"

  instructions: |
    Monorepo. En cualquier PR, evalúa si el cambio rompe contratos
    públicos entre paquetes (tipos exportados, APIs, esquemas de eventos).

    No comentes nitpicks de estilo — tenemos linters por paquete.

    Foco en:
    - Cambios en packages/* que podrían romper consumers
    - Duplicación de código que debería estar en un paquete shared/utils
    - Dependencias cross-package no declaradas en package.json
    - Version drift entre paquetes (mismo dep a dos versiones)
    - Breaking changes sin bump de version / changeset

  # AJUSTAR path_instructions según la estructura real del monorepo.
  # Descomentar y modificar los paths que apliquen.
  path_instructions:
    - path: "packages/shared/**,packages/utils/**,packages/types/**"
      instructions: |
        Paquete compartido. Cualquier cambio aquí afecta múltiples consumers.
        Flaggea breaking changes en APIs públicas explícitamente.
        Foco extra en backward compatibility y en tests.

    - path: "apps/web/**,apps/frontend/**"
      instructions: |
        Frontend app. Foco en: performance (bundle size, lazy loading),
        accessibility, y SSR/CSR correctness.

    - path: "apps/api/**,apps/backend/**,services/**"
      instructions: |
        Backend service. Foco en: validación de input, auth, rate limiting,
        manejo de errores sin leak de stack traces.

    - path: "infra/**,ops/**,terraform/**,k8s/**,deploy/**"
      instructions: |
        Infraestructura como código. Foco en: secretos hardcoded,
        permisos IAM excesivos, puertos abiertos al internet,
        y changes en prod sin plan/apply trail.

  tools:
    biome:
      enabled: true
    eslint:
      enabled: true
    gitleaks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
