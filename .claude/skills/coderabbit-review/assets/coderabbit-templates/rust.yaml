# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# .coderabbit.yaml — Rust

language: es-ES

tone_instructions: |
  Sé directo y conciso. Usa ejemplos de Rust idiomático.

reviews:
  profile: chill
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main, master]

  path_filters:
    - "!**/target/**"
    - "!**/Cargo.lock"
    - "!**/*.rs.bk"

  instructions: |
    Rust project. Cargo check / Clippy ya corren en CI, no dupliques esos warnings.

    Enfócate en:
    - unsafe blocks sin justificación en comentario
    - .unwrap() / .expect() en código que no sea tests o main
    - panic! en código de librería
    - Borrows que podrían ser más cortos (lifetimes excesivos)
    - Lógica que podría ser zero-cost con iterators en lugar de collect intermedio
    - async functions que hacen blocking I/O sin spawn_blocking
    - Falta de #[must_use] en tipos que retornan Result o handles
    - Secretos hardcodeados

  tools:
    clippy:
      enabled: true
    gitleaks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
