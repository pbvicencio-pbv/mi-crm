# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# .coderabbit.yaml — Docs-only repo (blogs, wikis, docs sites, knowledge bases)

language: es-ES

tone_instructions: |
  Sé directo y enfocado en contenido. Señala typos, inconsistencias técnicas,
  y contradicciones entre secciones. No comentes sobre estilo de redacción
  salvo que sea objetivamente confuso.

reviews:
  profile: chill
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main, master]

  path_filters:
    # Solo markdown, mdx, y configs de sitio
    - "!**/*"
    - "**/*.md"
    - "**/*.mdx"
    - "**/*.rst"
    - "**/*.txt"
    # Excepciones de assets pero no binarios
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.pdf"

  instructions: |
    Documentation repo. No hay código para revisar.

    Foco en:
    - Typos, gramática inconsistente (tú vs usted en español)
    - Ejemplos de código que no compilan o tienen bugs obvios
    - Comandos shell con flags incorrectos para la plataforma
    - Referencias rotas (links internos a secciones que no existen)
    - Contradicciones entre secciones del mismo doc
    - Pasos de tutoriales en orden incorrecto
    - Snippets que usan sintaxis/APIs deprecated

    No comentes sobre:
    - Preferencias de estilo de escritura
    - Longitud de oraciones
    - Uso de bullets vs párrafos

  tools:
    markdownlint:
      enabled: true
    languagetool:
      enabled: true
      enabled_rules:
        - SPELLING_RULE
        - GRAMMAR

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
