# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# .coderabbit.yaml — Plantilla para contratos Solidity / DeFi / Trading bots
# Para contratos on-chain (ERC-20/721/1155, AMM/LP, vaults), bots de trading
# off-chain, y scripts que envían transacciones. Ajusta los globs a tu repo.

language: es-ES

tone_instructions: |
  Sé directo y conciso. En código DeFi, cada comentario puede prevenir pérdida
  de fondos — prioriza claridad y razonamiento explícito.
  Cuando sugieras cambios, explica el vector de ataque o riesgo específico.

reviews:
  profile: assertive  # En DeFi queremos más feedback, no menos
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  sequence_diagrams: true  # Útil para flujos de contratos interactuando
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main, master, develop]

  path_filters:
    - "!**/node_modules/**"
    - "!**/artifacts/**"  # Hardhat compilation output
    - "!**/cache/**"
    - "!**/out/**"  # Foundry output
    - "!**/forge-cache/**"
    - "!**/typechain/**"
    - "!**/typechain-types/**"
    - "!**/coverage/**"
    - "!**/broadcast/**"  # Foundry deployment logs
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"

  instructions: |
    Este es código DeFi / Solidity / trading bot. Tratamos con fondos reales.

    CRÍTICO (siempre flaggear):
    - Reentrancia: llamadas externas antes de actualizar state (checks-effects-interactions)
    - Integer overflow/underflow en versiones <0.8.0 o con unchecked blocks
    - Falta de access control (onlyOwner, roles, multi-sig) en funciones que mueven fondos
    - tx.origin usado para auth (vulnerable a phishing)
    - delegatecall a contratos no confiables
    - Uso de block.timestamp o blockhash como fuente de aleatoriedad
    - Front-running / sandwich / MEV en swaps sin slippage protection
    - Oracle manipulation (lectura única de un TWAP de ventana corta, sin validación)
    - Hardcoded addresses que deberían ser immutable args o params
    - Centralization risks (función que permite al deployer drenar fondos)

    En trading bots / scripts off-chain (Node.js/Python):
    - Private keys en código fuente, env commiteado, o logs
    - Envío de tx sin simular primero (eth_call / estimateGas)
    - Falta de gas estimation con buffer (confirmar EIP-1559 parameters)
    - Slippage tolerance hardcoded sin configuración por ambiente
    - Retry loops que reenvían misma nonce (risk de double-spend)
    - Falta de manejo para reorgs (esperar N confirmaciones en mainnet)
    - Manejo incorrecto de decimales (18 vs 6 vs 8 — USDC vs WETH vs WBTC)

    No flaggees:
    - Missing natspec en funciones internal/private
    - Variable naming de length <3 en loops triviales

  path_instructions:
    - path: "**/contracts/**,**/src/**/*.sol"
      instructions: |
        Contratos Solidity. Aplica todas las reglas CRÍTICAS arriba.
        Verifica además:
        - SafeERC20 para tokens no-estándar (USDT, etc.)
        - Pull-over-push para pagos (evitar DoS en receive)
        - Events emitidos para todas las state changes relevantes
        - Upgrade patterns (UUPS vs Transparent) con storage layout preservation
        - Pausable patterns para emergency stop

    - path: "**/test/**,**/tests/**,**/*.t.sol"
      instructions: |
        Tests de contratos. Foco en: cobertura de edge cases (zero amounts,
        max uint, reentrancy tests con vault mock), fuzz tests con bounds
        razonables, invariant tests donde aplique. No comentes sobre estilo.

    - path: "**/bots/**,**/trading-bot*/**"
      instructions: |
        Bot de trading off-chain contra un exchange / DEX. Foco en:
        - Manejo correcto de maker vs taker orders
        - Rate limiting de API (evitar ban por spam)
        - Reconexión de WebSocket con backoff exponencial
        - Persistencia de estado de posiciones (no perder posiciones si el bot reinicia)
        - Hedging ratios correctos (long/short balanceado)
        - Liquidation price monitoring con margin de seguridad

    - path: "**/v3-lp/**,**/lp-manager/**,**/amm*/**"
      instructions: |
        Gestión de liquidez concentrada (AMM V3 / LP). Foco en:
        - Tick spacing correcto por fee tier (500=10, 3000=60, 10000=200)
        - Cálculo de sqrtPriceX96 con precisión de bits correcta
        - Impermanent loss tracking
        - Rebalancing logic con umbrales para evitar ping-pong de gas
        - NFT position ownership antes de llamar increaseLiquidity/decreaseLiquidity
        - Permit vs approve para gas efficiency

    - path: "**/nft/**,**/erc721/**,**/mint*"
      instructions: |
        Contratos NFT (ERC-721 / ERC-1155).
        Foco en: minting access control, royalties (ERC-2981),
        metadata immutable vs mutable (IPFS vs onchain), batch operations
        con límite para evitar out-of-gas, y compatibilidad OpenSea
        (supportsInterface correcto).

  tools:
    gitleaks:
      enabled: true
    # Slither sería ideal pero no está en la lista de integraciones oficiales de CR
    # Correrlo separadamente en CI
    markdownlint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto

# Pre-merge checks son muy valiosos aquí dado el riesgo
pre_merge_checks:
  docstrings:
    mode: warning
  issue_assessment:
    mode: warning
