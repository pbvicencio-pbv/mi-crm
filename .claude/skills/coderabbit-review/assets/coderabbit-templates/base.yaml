# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# .coderabbit.yaml — Plantilla base genérica (v2 — state-of-the-art 2026-04)
#
# GENERADO-DE: coderabbit-review skill. Mantener en sync con el template.
# Si se edita en un repo concreto, dejar comentarios "# LOCAL: <razón>" en
# las líneas divergentes para facilitar re-aplicación.
#
# Filosofía:
# - Español por default (`language: es-ES`). Configurable: cámbialo al idioma
#   del equipo (p. ej. en-US, pt-BR) según convenga.
# - profile chill como default (el perfil assertive causa abandono por ruido
#   en las primeras semanas; el consumidor puede override).
# - Linters locales (ESLint/Biome/Ruff) se mantienen activos en CR por ahora
#   porque muchos repos no tienen aún esas herramientas locales como fuente
#   de verdad. Si el repo instala linters locales, desactivarlos aquí.
# - Tools SAST (gitleaks, trufflehog, semgrep, opengrep, osvScanner, trivy,
#   checkov, ast-grep) cubren security + misconfig + dependencies.
#
# Ver: https://docs.coderabbit.ai/reference/configuration

# Idioma del review — configurable (es-ES por default; usa en-US, pt-BR, etc.)
language: es-ES

tone_instructions: |
  Sé directo y conciso. Salta los pleasantries.
  Explica el razonamiento detrás de cada sugerencia en una sola frase.
  Usa ejemplos de código cuando sugieras alternativas concretas.
  No elogies código que está bien — solo comenta cuando hay algo accionable.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: false
  changed_files_summary: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - master
      - develop
      - staging

  # Paths excluidos globalmente del review
  path_filters:
    # Dependencias y artefactos de build
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/.nuxt/**"
    - "!**/coverage/**"
    - "!**/.turbo/**"
    - "!**/target/**"
    - "!**/vendor/**"
    - "!**/__pycache__/**"
    - "!**/.venv/**"
    - "!**/venv/**"
    # Lockfiles
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/yarn.lock"
    - "!**/Cargo.lock"
    - "!**/poetry.lock"
    - "!**/go.sum"
    # Archivos generados
    - "!**/*.generated.*"
    - "!**/*.gen.go"
    - "!**/*.gen.*"
    - "!**/*.pb.*"
    - "!**/*.g.dart"
    - "!**/*.d.ts"
    - "!**/generated/**"
    - "!**/__generated__/**"
    # Minified / bundled
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/*.bundle.js"
    # Assets binarios
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.svg"
    - "!**/*.ico"
    - "!**/*.pdf"
    - "!**/*.mp4"
    - "!**/*.woff*"
    # Snapshots de tests (cambian frecuentemente)
    - "!**/__snapshots__/**"
    - "!**/*.snap"
    # Migraciones DB (solo lectura desde el punto de vista del review)
    - "!**/migrations/versions/**"
    - "!**/supabase/migrations/**"

  # Instrucción global: qué NO comentar
  instructions: |
    No comentes sobre:
    - Orden de imports (lo maneja el linter automáticamente)
    - Longitud de líneas (lo maneja Prettier/Black)
    - Falta de JSDoc/docstrings en funciones internas no exportadas
    - Naming de variables internas (nombres como i, j, tmp en scopes pequeños está bien)
    - Uso de `any` en código de prueba (tests/**) — está permitido
    - Estilo de comillas o trailing commas (autoformateado)

    Enfoca atención extra en:
    - Manejo completo de errores (try/catch, error boundaries, resultado Err)
    - Vulnerabilidades de seguridad (inyección SQL/NoSQL/command, XSS, SSRF, secretos hardcodeados)
    - Performance en queries de base de datos y loops sobre datasets potencialmente grandes
    - Validación de input en endpoints expuestos al usuario (APIs, forms, webhooks)
    - Race conditions en código concurrente
    - Manejo correcto de tipos nullable / optional

  # Tools SAST y linters habilitados por default.
  # Notas:
  # - eslint y biome se dejan ACTIVOS por ahora; muchos repos no tienen
  #   estas herramientas locales todavía. Cuando un repo las tenga, en su
  #   .coderabbit.yaml local poner enabled: false para evitar duplicación.
  # - languagetool con categorías ruidosas deshabilitadas (TYPOS, TYPOGRAPHY
  #   y CASING generan mucho ruido en docs técnicas bilingües).
  tools:
    # Seguridad / secrets
    gitleaks: { enabled: true }
    trufflehog: { enabled: true }
    semgrep: { enabled: true }
    opengrep: { enabled: true }
    osvScanner: { enabled: true }
    trivy: { enabled: true }
    checkov: { enabled: true }
    # AST patterns
    ast-grep: { essential_rules: true }
    # Lenguaje natural (prosa en docs/PR descriptions)
    languagetool:
      enabled: true
      level: "default"
      disabled_categories:
        - "TYPOS"
        - "TYPOGRAPHY"
        - "CASING"
    # Docs
    markdownlint: { enabled: true }
    # YAML / Actions
    yamllint: { enabled: true }
    actionlint: { enabled: true }
    # Shell / Docker
    shellcheck: { enabled: true }
    hadolint: { enabled: true }
    # Lenguajes (activos por ahora — desactivar en repos con linters locales)
    eslint: { enabled: true }
    biome: { enabled: true }
    ruff: { enabled: true }
    # GitHub checks
    github-checks:
      enabled: true
      timeout_ms: 90000

  # Pre-merge checks — activos por default con custom_check "No secrets" en
  # modo error (seguridad crítica no negociable).
  pre_merge_checks:
    title:
      mode: warning
      requirements: |
        PR title debe seguir Conventional Commits:
        feat|fix|chore|docs|refactor|test|ci(scope): descripción
    description:
      mode: warning
    issue_assessment:
      mode: warning
    custom_checks:
      - mode: "error"
        name: "No secrets in code"
        instructions: |
          El PR NO debe contener secrets, API keys, tokens, private keys
          ni URLs con credenciales embebidas. Patrones a detectar (no exhaustivo,
          representados con placeholders para evitar falsos positivos de secret
          scanners al propagar este template a otros repos): <stripe-live-key>,
          <stripe-publishable-key>, <slack-bot-token>, <slack-user-token>,
          <github-token>, <aws-access-key>, <google-api-key>,
          <private-key-header>, private_key=<secret>, api_key=<secret>,
          jwt_secret=<secret>, postgres://<user>:<pass>@<host>,
          redis://:<pass>@<host>.
          Si se detecta cualquier credencial real: BLOQUEAR merge y pedir rotar
          la credencial inmediatamente.
      - mode: "warning"
        name: "Breaking changes documentados"
        instructions: |
          Si el PR modifica schema de datos, elimina endpoints públicos, o cambia
          firmas públicas de funciones exportadas, debe incluir sección
          "## Breaking changes" en la descripción del PR con: 1) qué rompe,
          2) plan de migración, 3) compatibilidad hacia atrás.

# Al mencionar @coderabbitai, responde automáticamente
# cuando el contexto lo permite
chat:
  auto_reply: true

# Knowledge base: persiste learnings del repo a lo largo del tiempo.
# code_guidelines añadido para que CR lea las convenciones del repo desde
# los archivos documentados.
knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "docs/decisions/**"
      - "docs/explanation/**"
      - "docs/coding-standards/**"
