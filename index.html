<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi CRM</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a2b4a;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    button {
      font-size: 1.1rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>Bienvenido a mi CRM</h1>
  <button onclick="alert('¡Hola! Pronto tendrás más funciones aquí.')">Comenzar</button>
</body>
</html>
